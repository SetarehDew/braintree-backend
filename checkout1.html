<!DOCTYPE html>
<html>
<head>
  <title>Braintree Sandbox Test</title>
  <script src="https://js.braintreegateway.com/web/dropin/1.37.0/js/dropin.min.js"></script>
</head>
<body>
  <h2>Test Braintree Payment</h2>
  <div id="dropin-container"></div>
  <button id="submit-button">Pay</button>

  <script>
    fetch('https://braintree-backend1.onrender.com/token')
      .then(response => response.json())
      .then(data => {
        const token = data.clientToken;

        braintree.dropin.create({
          authorization: token,
          container: '#dropin-container'
        }, function (createErr, instance) {

          if (createErr) {
            console.error(createErr);
            return;
          }

          document.getElementById('submit-button').addEventListener('click', function () {
            instance.requestPaymentMethod(function (err, payload) {

              if (err) {
                console.error(err);
                return;
              }

              fetch('https://braintree-backend1.onrender.com/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nonce: payload.nonce })
              })
              .then(res => res.json())
              .then(data => alert('Payment result: ' + JSON.stringify(data)))
              .catch(err => console.error(err));

            });
          });

        });
      });
  </script>
</body>
</html>
